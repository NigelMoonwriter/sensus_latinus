<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SENSUS LATINUS — Diccionario Latino &lt;-&gt; Griego &lt;-&gt; Español</title>
<style>
:root{--black:#0a0a0a;--cream:#f5f0e8;--red:#c23b22;--gray-d:#333;--gray-m:#888;--gray-l:#d4cfc6;--serif:Georgia,'Times New Roman',serif;--sans:system-ui,-apple-system,sans-serif;--mono:Consolas,'Courier New',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--cream);color:var(--black);font-family:var(--sans);overflow-x:hidden;min-height:100vh}
::selection{background:var(--red);color:var(--cream)}
a{color:var(--red);text-decoration:none}

/* === HERO === */
.hero{position:relative;height:50vh;min-height:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;overflow:hidden;background:var(--black);color:var(--cream)}
.hero-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.hero-bg span{position:absolute;font-family:var(--serif);color:rgba(255,255,255,.04);font-weight:900;white-space:nowrap}
.hero-bg .d1{font-size:22vw;top:-10%;left:-5%;transform:rotate(-8deg)}
.hero-bg .d2{font-size:15vw;bottom:-5%;right:-3%;transform:rotate(12deg)}
.hero-bg .d3{font-size:10vw;top:30%;left:60%;transform:rotate(-3deg);opacity:.5}
.hero-title{font-family:var(--serif);font-size:clamp(2.8rem,7.5vw,6.5rem);font-weight:900;letter-spacing:-.03em;line-height:.9;z-index:2;text-transform:uppercase;position:relative}
.hero-title .accent{color:var(--red);display:inline-block;transform:rotate(-5deg)}
.hero-sub{font-family:var(--mono);font-size:clamp(.6rem,1.3vw,.85rem);letter-spacing:.3em;text-transform:uppercase;margin-top:1rem;z-index:2;opacity:.7}
.hero-sub2{font-family:var(--serif);font-size:clamp(.85rem,1.8vw,1.2rem);font-style:italic;margin-top:.5rem;z-index:2;opacity:.5}

/* === SEARCH BAR === */
.search-section{background:var(--cream);padding:1.5rem 1rem;position:sticky;top:0;z-index:100;border-bottom:2px solid var(--black)}
.search-wrap{max-width:700px;margin:0 auto;position:relative}
.search-wrap input{width:100%;padding:.9rem 2.5rem .7rem 1.2rem;font-family:var(--serif);font-size:1.15rem;border:2px solid var(--black);background:transparent;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--red)}
.search-wrap input::placeholder{color:var(--gray-m);font-style:italic}
.search-wrap .icon{position:absolute;right:1rem;top:50%;transform:translateY(-50%);font-size:1.2rem;opacity:.3;pointer-events:none}

/* === MODE BAR === */
.mode-bar{display:flex;justify-content:center;gap:.5rem;padding:.5rem 1rem;background:var(--cream);max-width:700px;margin:0 auto}
.mode-btn{padding:.3rem .8rem;border:1px solid var(--gray-m);background:transparent;font-family:var(--sans);font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .2s;border-radius:2px;color:var(--black)}
.mode-btn.active{background:var(--black);color:var(--cream);border-color:var(--black)}
.mode-btn:hover{border-color:var(--red)}

/* === THEME NAV === */
.themes-nav{background:var(--cream);padding:.8rem 1rem;display:flex;flex-wrap:wrap;justify-content:center;gap:.35rem;max-width:900px;margin:0 auto}
.theme-btn{padding:.3rem .6rem;font-family:var(--mono);font-size:.62rem;border:1px solid var(--gray-l);background:transparent;cursor:pointer;transition:all .15s;text-transform:uppercase;border-radius:1px;color:var(--black)}
.theme-btn:hover,.theme-btn.active{background:var(--black);color:var(--cream);border-color:var(--black)}

/* === MAIN === */
.main{max-width:880px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* === ENTRY CARD === */
.entry-card{background:var(--cream);border:2px solid var(--black);margin-bottom:2rem;overflow:hidden;position:relative;transition:box-shadow .2s}
.entry-card:hover{box-shadow:6px 6px 0 var(--black)}
.entry-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--red)}
.entry-card.featured{border-width:3px}
.entry-header{padding:1.3rem 1.3rem .4rem;display:flex;align-items:baseline;gap:.7rem;flex-wrap:wrap}
.entry-lemma{font-family:var(--serif);font-size:1.8rem;font-weight:900;letter-spacing:-.02em}
.entry-pos{font-family:var(--mono);font-size:.65rem;text-transform:uppercase;letter-spacing:.12em;color:var(--cream);background:var(--red);padding:.12rem .4rem;border-radius:1px}
.entry-ipa{font-family:var(--mono);font-size:.78rem;color:var(--gray-m)}
.entry-level{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em;color:var(--gray-m);margin-left:auto;background:var(--gray-l);padding:.1rem .35rem;border-radius:1px}
.entry-body{padding:0 1.3rem 1.3rem}

/* Definitions */
.entry-def{margin-bottom:1rem}
.entry-def dt{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.14em;color:var(--gray-m);margin-bottom:.25rem}
.entry-def dd{font-family:var(--serif);font-size:.95rem;line-height:1.6;padding-left:.5rem;border-left:2px solid var(--gray-l);margin-bottom:.3rem}

/* Etymology */
.etym-section{margin:.8rem 0;padding:.9rem;background:rgba(0,0,0,.03);border-left:3px solid var(--black)}
.etym-section h4{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.5rem;color:var(--gray-d)}
.etym-path{display:flex;flex-wrap:wrap;align-items:center;gap:.25rem;font-family:var(--mono);font-size:.75rem}
.etym-path .node{background:var(--black);color:var(--cream);padding:.15rem .45rem;font-size:.65rem;border-radius:1px}
.etym-path .arrow{color:var(--red);font-weight:700;font-size:1rem}
.etym-notes{font-style:italic;font-size:.82rem;color:var(--gray-d);margin-top:.4rem;line-height:1.5}

/* Evolution Timeline */
.evo-section{margin:.8rem 0}
.evo-section h4{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.14em;color:var(--gray-m);margin-bottom:.6rem}
.evo-timeline{position:relative;padding-left:1.3rem}
.evo-timeline::before{content:'';position:absolute;left:.3rem;top:0;bottom:0;width:2px;background:var(--gray-l)}
.evo-step{position:relative;margin-bottom:.7rem;padding:.45rem .6rem;background:rgba(0,0,0,.02);font-size:.82rem}
.evo-step::before{content:'';position:absolute;left:-1.1rem;top:.65rem;width:7px;height:7px;background:var(--red);border-radius:50%}
.evo-step .step-label{font-family:var(--mono);font-size:.55rem;text-transform:uppercase;letter-spacing:.1em;color:var(--red);margin-bottom:.15rem}
.evo-step .step-forms{font-family:var(--mono);font-size:.82rem}
.evo-step .step-forms .from{color:var(--gray-m);text-decoration:line-through}
.evo-step .step-forms .to{font-weight:700;color:var(--black)}
.evo-step .step-rule{font-size:.72rem;color:var(--gray-m);margin-top:.1rem;font-style:italic}
.evo-step .step-explain{font-size:.78rem;line-height:1.4;color:var(--gray-d);margin-top:.1rem}

/* Derivatives & Cognates */
.deriv-section h4,.cogn-section h4{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.14em;color:var(--gray-m);margin:.8rem 0 .4rem}
.deriv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.4rem;margin:.4rem 0}
.deriv-item{padding:.35rem .5rem;border:1px solid var(--gray-l);font-size:.78rem;display:flex;justify-content:space-between;align-items:center;border-radius:1px}
.deriv-item .lang{font-family:var(--mono);font-size:.55rem;color:var(--red);text-transform:uppercase}

/* Compare table */
.compare-section{margin:.8rem 0}
.compare-section h4{font-family:var(--mono);font-size:.62rem;text-transform:uppercase;letter-spacing:.14em;color:var(--gray-m);margin-bottom:.4rem}
.compare-table{width:100%;border-collapse:collapse;font-size:.82rem}
.compare-table th{font-family:var(--mono);font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;padding:.35rem .4rem;border-bottom:2px solid var(--black);text-align:left;background:var(--black);color:var(--cream)}
.compare-table td{padding:.35rem .4rem;border-bottom:1px solid var(--gray-l)}

/* Example */
.entry-example{margin:.8rem 0;padding:.9rem 1rem;background:var(--black);color:var(--cream);font-family:var(--serif);font-style:italic;font-size:.9rem;line-height:1.55;position:relative;border-left:3px solid var(--red)}

/* Tags */
.tag{display:inline-block;padding:.1rem .35rem;font-family:var(--mono);font-size:.55rem;text-transform:uppercase;letter-spacing:.08em;border:1px solid var(--gray-l);margin-right:.25rem;margin-bottom:.25rem;border-radius:1px;color:var(--gray-d)}

/* Level content toggling */
body.mode-basico .lvl-intermedio,body.mode-basico .lvl-avanzado{display:none}
body.mode-intermedio .lvl-basico,body.mode-intermedio .lvl-avanzado{display:none}
body.mode-avanzado .lvl-basico{display:none}

/* === NO RESULTS === */
.no-results{text-align:center;padding:3rem 1rem;font-family:var(--serif);font-size:1.2rem;color:var(--gray-m)}
.no-results small{display:block;margin-top:.5rem;font-size:.8rem;opacity:.6}

/* === FOOTER === */
.footer{background:var(--black);color:var(--cream);padding:2rem 1rem;text-align:center;font-family:var(--mono);font-size:.65rem;letter-spacing:.1em}
.footer .logo{font-family:var(--serif);font-size:1.4rem;font-weight:900;margin-bottom:.4rem}

/* === COUNTER === */
.results-counter{text-align:center;font-family:var(--mono);font-size:.65rem;color:var(--gray-m);letter-spacing:.1em;margin-bottom:1rem;text-transform:uppercase}

/* === RESPONSIVE === */
@media(max-width:600px){
  .hero{height:38vh;min-height:260px}
  .entry-header{padding:1rem 1rem .3rem}
  .entry-lemma{font-size:1.4rem}
  .entry-body{padding:0 1rem 1rem}
  .themes-nav{padding:.5rem}
  .deriv-grid{grid-template-columns:1fr}
  .compare-table{font-size:.72rem}
}
</style>
</head>

/* ============================================================
   STATE
   ============================================================ */
var currentMode = "basico";
var currentTheme = null;
var searchQuery = "";

/* ============================================================
   DOM REFERENCES
   ============================================================ */
var searchInput, mainContent, modeBar, themesNav;

/* ============================================================
   FUNCTIONS
   ============================================================ */
function setMode(mode) {
  currentMode = mode;
  document.body.className = "mode-" + mode;
  var btns = modeBar.querySelectorAll(".mode-btn");
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute("data-mode") === mode) {
      btns[i].classList.add("active");
    } else {
      btns[i].classList.remove("active");
    }
  }
  renderEntries();
}

function setTheme(themeId) {
  currentTheme = (currentTheme === themeId) ? null : themeId;
  var btns = themesNav.querySelectorAll(".theme-btn");
  for (var i = 0; i < btns.length; i++) {
    if (btns[i].getAttribute("data-theme") === currentTheme) {
      btns[i].classList.add("active");
    } else {
      btns[i].classList.remove("active");
    }
  }
  renderEntries();
}

function filterEntries() {
  var results = [];
  for (var i = 0; i < ENTRIES.length; i++) {
    var e = ENTRIES[i];
    if (currentTheme && e.themes.indexOf(currentTheme) === -1) continue;
    if (searchQuery) {
      var q = searchQuery.toLowerCase();
      var found = false;
      if (e.lemma.toLowerCase().indexOf(q) !== -1) found = true;
      if (!found) {
        for (var d = 0; d < e.defs.length; d++) {
          if (e.defs[d].toLowerCase().indexOf(q) !== -1) { found = true; break; }
        }
      }
      if (!found && e.etym.pie.toLowerCase().indexOf(q) !== -1) found = true;
      if (!found) {
        for (var dv = 0; dv < e.deriv.length; dv++) {
          if (e.deriv[dv].w.toLowerCase().indexOf(q) !== -1) { found = true; break; }
        }
      }
      if (!found) {
        for (var c = 0; c < e.cogn.length; c++) {
          if (e.cogn[c].w.toLowerCase().indexOf(q) !== -1) { found = true; break; }
        }
      }
      if (!found && e.example.toLowerCase().indexOf(q) !== -1) found = true;
      if (!found) continue;
    }
    results.push(e);
  }
  return results;
}

function esc(str) {
  var d = document.createElement("div");
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function renderEntries() {
  var filtered = filterEntries();
  var html = "";
  html += '<div class="results-counter">' + filtered.length + ' entrada' + (filtered.length !== 1 ? "s" : "") + '</div>';

  if (filtered.length === 0) {
    html += '<div class="no-results">No se encontraron resultados.<small>Intenta con otra búsqueda o selecciona un área temática.</small></div>';
    mainContent.innerHTML = html;
    return;
  }

  // Featured first
  var featured = ["a_priori", "a_posteriori"];
  var sorted = filtered.slice().sort(function(a, b) {
    var aI = featured.indexOf(a.id);
    var bI = featured.indexOf(b.id);
    if (aI !== -1 && bI === -1) return -1;
    if (aI === -1 && bI !== -1) return 1;
    return 0;
  });

  for (var i = 0; i < sorted.length; i++) {
    html += renderEntry(sorted[i]);
  }
  mainContent.innerHTML = html;
}

function renderEntry(e) {
  var showInter = (currentMode === "intermedio" || currentMode === "avanzado");
  var showAdv = (currentMode === "avanzado");
  var langTag = (e.lang === "greek") ? "GRIEGO" : "LATIN";
  var featured = (e.id === "a_priori" || e.id === "a_posteriori") ? " featured" : "";
  var h = '<article class="entry-card' + featured + '" id="' + e.id + '">';
  h += '<div class="entry-header">';
  h += '<span class="entry-lemma">' + esc(e.lemma) + '</span>';
  h += '<span class="entry-pos">' + esc(e.pos) + '</span>';
  if (e.ipa) h += '<span class="entry-ipa">' + esc(e.ipa) + '</span>';
  h += '<span class="entry-level">' + esc(e.level) + ' &middot; ' + langTag + '</span>';
  h += '</div>';
  h += '<div class="entry-body">';

  // Definitions
  h += '<dl class="entry-def"><dt>Definiciones</dt>';
  for (var d = 0; d < e.defs.length; d++) {
    h += '<dd>' + esc(e.defs[d]) + '</dd>';
  }
  h += '</dl>';

  // Etymology
  h += '<div class="etym-section"><h4>Etimología</h4>';
  h += '<div class="etym-path">';
  if (e.etym.pie) h += '<span class="node">' + esc(e.etym.pie) + '</span>';
  for (var p = 0; p < e.etym.path.length; p++) {
    h += '<span class="arrow">&rarr;</span><span class="node">' + esc(e.etym.path[p]) + '</span>';
  }
  h += '</div>';
  h += '<p class="etym-notes">' + esc(e.etym.notes) + '</p>';
  h += '</div>';

  // Evolution
  if (e.evo.length > 0) {
    h += '<div class="evo-section lvl-intermedio"><h4>Evolución fonética</h4><div class="evo-timeline">';
    for (var s = 0; s < e.evo.length; s++) {
      var step = e.evo[s];
      h += '<div class="evo-step">';
      h += '<div class="step-label">Paso ' + step.s + '</div>';
      h += '<div class="step-forms"><span class="from">' + esc(step.from) + '</span> &rarr; <span class="to">' + esc(step.to) + '</span></div>';
      if (step.rule) h += '<div class="step-rule">' + esc(step.rule) + '</div>';
      h += '<div class="step-explain">' + esc(step.exp) + '</div>';
      h += '</div>';
    }
    h += '</div></div>';
  }

  // Comparison table (advanced)
  if (e.cmp) {
    h += '<div class="compare-section lvl-avanzado"><h4>Comparación romance</h4>';
    h += '<table class="compare-table"><tr><th>Latin culto</th><th>Latin vulgar</th><th>Español</th><th>Italiano</th><th>Francés</th></tr>';
    h += '<tr><td>' + esc(e.cmp.culto) + '</td><td>' + esc(e.cmp.vulgar) + '</td><td>' + esc(e.cmp.es) + '</td><td>' + esc(e.cmp.it) + '</td><td>' + esc(e.cmp.fr) + '</td></tr>';
    h += '</table></div>';
  }

  // Derivatives
  if (e.deriv.length > 0) {
    h += '<div class="deriv-section"><h4>Derivados</h4><div class="deriv-grid">';
    for (var dv = 0; dv < e.deriv.length; dv++) {
      h += '<div class="deriv-item"><span>' + esc(e.deriv[dv].w) + '</span><span class="lang">' + esc(e.deriv[dv].l) + '</span></div>';
    }
    h += '</div></div>';
  }

  // Cognates (intermedio+)
  if (e.cogn.length > 0) {
    h += '<div class="cogn-section lvl-intermedio"><h4>Cognados</h4><div class="deriv-grid">';
    for (var c = 0; c < e.cogn.length; c++) {
      var ctext = esc(e.cogn[c].w);
      if (e.cogn[c].m) ctext += ' (' + esc(e.cogn[c].m) + ')';
      h += '<div class="deriv-item"><span>' + ctext + '</span><span class="lang">' + esc(e.cogn[c].l) + '</span></div>';
    }
    h += '</div></div>';
  }

  // Example
  h += '<div class="entry-example">' + esc(e.example) + '</div>';

  // Tags
  h += '<div style="margin-top:.7rem">';
  for (var t = 0; t < e.themes.length; t++) {
    var thm = null;
    for (var ti = 0; ti < THEMES.length; ti++) {
      if (THEMES[ti].id === e.themes[t]) { thm = THEMES[ti]; break; }
    }
    if (thm) h += '<span class="tag">' + esc(thm.label) + '</span>';
  }
  h += '</div>';

  h += '</div></article>';
  return h;
}

/* ============================================================
   INIT
   ============================================================ */
function init() {
  searchInput = document.getElementById("searchInput");
  mainContent = document.getElementById("mainContent");
  modeBar = document.getElementById("modeBar");
  themesNav = document.getElementById("themesNav");

  // Build theme buttons
  var thtml = "";
  for (var i = 0; i < THEMES.length; i++) {
    thtml += '<button class="theme-btn" data-theme="' + THEMES[i].id + '">' + THEMES[i].id + '</button>';
  }
  themesNav.innerHTML = thtml;

  // Theme click
  themesNav.addEventListener("click", function(ev) {
    var btn = ev.target;
    if (btn.classList && btn.classList.contains("theme-btn")) {
      setTheme(btn.getAttribute("data-theme"));
    }
  });

  // Mode click
  modeBar.addEventListener("click", function(ev) {
    var btn = ev.target;
    if (btn.classList && btn.classList.contains("mode-btn")) {
      setMode(btn.getAttribute("data-mode"));
    }
  });

  // Search input
  var debounceTimer = null;
  searchInput.addEventListener("input", function() {
    if (debounceTimer) clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      searchQuery = searchInput.value.trim();
      renderEntries();
    }, 150);
  });

  // Also trigger search on Enter
  searchInput.addEventListener("keydown", function(ev) {
    if (ev.key === "Enter") {
      searchQuery = searchInput.value.trim();
      renderEntries();
    }
  });

  // Initial render
  renderEntries();
}

// Start
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}

})();
</script>
